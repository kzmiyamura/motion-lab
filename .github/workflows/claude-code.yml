name: Claude Code Assistant (Haiku Mode)
on:
  issue_comment:
    types: [created]

jobs:
  claude_job:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "Claude-Haiku"
          git config user.email "claude-haiku@example.com"

      - name: Run Claude Code with Guardrails
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          ANTHROPIC_MODEL: haiku
          ANTHROPIC_BETA: prompt-caching-2024-07-31
        run: |
          PROMPT="${COMMENT_BODY/@claude/}"
          
          # --- ガードレール1: プロンプトの長さ制限 (非エンジニアの長文コピペ対策) ---
          if [ ${#PROMPT} -gt 1000 ]; then
            echo "Error: Prompt is too long. Please keep it under 1000 characters." > /tmp/claude_response.txt
            exit 1
          fi

          # --- ガードレール2: 編集範囲の制限 (AudioEngineなどの核となるファイルを保護) ---
          # 非エンジニアには UI や CSS、文言の修正に専念させる指示をシステム的に追加
          SYSTEM_INSTRUCTION="You are a helpful assistant for non-engineers. Focus on UI, CSS, and text changes. Avoid modifying core logic in AudioEngine.ts unless explicitly needed for UI display."
          
          # 実行（読み込むファイルを src/components などのUI層に制限してトークン節約）
          claude --dangerously-skip-permissions "$SYSTEM_INSTRUCTION $PROMPT" > /tmp/claude_response.txt 2>&1 || true

      - name: Commit and push changes if any
        if: success() # ガードレールでエラーになった場合は実行しない
        run: |
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "docs/ui: Claude-HaikuによるUI/文言調整" -m "Request: ${COMMENT_BODY}"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes were generated."
          fi

      - name: Post response as comment
        if: always() # 成功・失敗に関わらず結果を報告
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let response = "Response file not found.";
            if (fs.existsSync('/tmp/claude_response.txt')) {
              response = fs.readFileSync('/tmp/claude_response.txt', 'utf8');
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `**🤖 Claude (Haiku):**\n\n${response}`,
            });