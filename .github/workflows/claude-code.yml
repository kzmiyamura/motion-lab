name: Claude Code Assistant
on:
  issue_comment:
    types: [created]

jobs:
  claude_job:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # 【重要】リボジトリの全履歴を取得（エラー対策）
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "Claude"
          git config user.email "claude@anthropic.com"

      - name: Run Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          # 【節約】モデルを Haiku に指定
          ANTHROPIC_MODEL: claude-3-5-haiku-20241022
          # 【節約】プロンプトキャッシュを有効化（90% OFF）
          ANTHROPIC_BETA: prompt-caching-2024-07-31
        run: |
          PROMPT="${COMMENT_BODY/@claude/}"
          claude --dangerously-skip-permissions "$PROMPT" > /tmp/claude_response.txt 2>&1 || true

      - name: Commit and push changes if any
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          git add -A
          if ! git diff --cached --quiet; then
            # 【履歴】リクエスト内容をメッセージに含める
            git commit -m "feat: Claudeによる自動実装" -m "Request: ${COMMENT_BODY}"
            # 【重要】競合を自動解消して取り込む（エラー対策）
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes were generated by Claude."
          fi

      - name: Post response as comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const response = fs.readFileSync('/tmp/claude_response.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `**🤖 Claude:**\n\n${response}`,
            });