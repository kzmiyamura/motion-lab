name: Claude Code Assistant
on:
  issue_comment:
    types: [created]

jobs:
  claude_job:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          # GITHUB_TOKEN で push できるよう認証トークンを明示
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "Claude"
          git config user.email "claude@anthropic.com"

      - name: Run Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          PROMPT="${COMMENT_BODY/@claude/}"
          claude --dangerously-skip-permissions "$PROMPT" > /tmp/claude_response.txt 2>&1 || true

      - name: Commit and push changes if any
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "feat: GitHub Actions Claude による自動実装"
          git push origin main || true

      - name: Post response as comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const response = fs.readFileSync('/tmp/claude_response.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `**🤖 Claude:**\n\n${response}`,
            });
