name = "motion-lab"
compatibility_date = "2024-09-23"

# Cloudflare Pages ビルド成果物
pages_build_output_dir = "dist"

# ──────────────────────────────────────────
# D1 Database (SQLite @ Edge)
# 実際の database_id は `wrangler d1 create motion-lab-db` 実行後に設定
# ──────────────────────────────────────────
[[d1_databases]]
binding  = "DB"
database_name = "motion-lab-db"
database_id   = "00000000-0000-0000-0000-000000000000"   # ← 要更新

# ──────────────────────────────────────────
# R2 Bucket (オブジェクトストレージ)
# 実際のバケットは `wrangler r2 bucket create motion-lab-storage` 実行後に有効
# ──────────────────────────────────────────
[[r2_buckets]]
binding     = "STORAGE"
bucket_name = "motion-lab-storage"

# ──────────────────────────────────────────
# 環境変数 (非シークレット)
# ──────────────────────────────────────────
[vars]
APP_ENV = "production"

# ──────────────────────────────────────────
# ローカル開発環境 (wrangler pages dev)
# D1・R2 はローカルファイルシステムで自動エミュレート
# ──────────────────────────────────────────
[env.local]
[env.local.vars]
APP_ENV = "local"
